name: Bug Report
description: 提交一个可复现的问题报告
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 清楚描述问题现象，以及你原本期望发生什么。
      placeholder: 例如：系统设置保存成功后，刷新页面仍然反复弹出认证框。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 尽量写成别人可以直接复现的步骤。
      placeholder: |
        1. 打开系统设置
        2. 保存新的 API 密钥
        3. 刷新页面
        4. 看到认证弹窗再次出现
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 刷新页面后不应再次弹出认证框。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请填写版本、部署方式、操作系统、浏览器等。
      placeholder: |
        版本：v1.2.1
        部署方式：Docker
        操作系统：Ubuntu 22.04
        浏览器：Chrome 134
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志或截图
      description: 请先确认不要粘贴密钥、密码、邮箱账号、IP 白名单等敏感信息。
      render: shell
