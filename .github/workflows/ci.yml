name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show tool versions
        run: |
          python --version
          node --version

      - name: Python syntax check
        run: python tools/run_checks.py --section python

      - name: Frontend syntax check
        run: python tools/run_checks.py --section frontend

      - name: Regression tests
        run: python tools/run_checks.py --section tests

      - name: Verify release metadata
        run: python tools/check_release_metadata.py

      - name: Verify release export script
        if: runner.os == 'Linux'
        run: python tools/export_release.py --target "$RUNNER_TEMP/pt-auto-release"
