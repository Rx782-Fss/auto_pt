name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checks on Linux
        if: runner.os != 'Windows'
        run: |
          chmod +x check.sh
          ./check.sh

      - name: Run checks on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: check.bat

      - name: Verify release export script
        if: runner.os == 'Linux'
        run: python tools/export_release.py --target "$RUNNER_TEMP/pt-auto-release"
