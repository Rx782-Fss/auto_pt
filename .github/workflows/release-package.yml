name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Export clean release directory
        env:
          RELEASE_DIR: ${{ runner.temp }}/pt-auto-release
        run: python tools/export_release.py --target "$RELEASE_DIR"

      - name: Archive release package
        env:
          RELEASE_DIR: ${{ runner.temp }}/pt-auto-release
          RELEASE_ZIP: ${{ runner.temp }}/pt-auto-downloader-release.zip
        run: |
          python - <<'PY'
          import os
          import shutil

          release_dir = os.environ["RELEASE_DIR"]
          release_zip = os.environ["RELEASE_ZIP"]
          base_name = release_zip[:-4] if release_zip.endswith(".zip") else release_zip
          shutil.make_archive(base_name, "zip", release_dir)
          PY

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pt-auto-downloader-release
          path: ${{ runner.temp }}/pt-auto-downloader-release.zip
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/pt-auto-downloader-release.zip
          generate_release_notes: true
