name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show tool versions
        run: |
          python --version
          node --version

      - name: Run checks
        run: python tools/run_checks.py

      - name: Verify release metadata and generate release notes
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_REF_TYPE: ${{ github.ref_type }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
        run: |
          if [ "$GIT_REF_TYPE" = "tag" ]; then
            python tools/check_release_metadata.py --tag "$GIT_REF_NAME" --write-release-notes "$RELEASE_NOTES_FILE"
          else
            python tools/check_release_metadata.py --write-release-notes "$RELEASE_NOTES_FILE"
          fi

      - name: Export clean release directory
        env:
          RELEASE_DIR: ${{ runner.temp }}/pt-auto-release
        run: python tools/export_release.py --target "$RELEASE_DIR"

      - name: Verify exported release directory
        env:
          RELEASE_DIR: ${{ runner.temp }}/pt-auto-release
        run: python tools/export_release.py --verify-only --target "$RELEASE_DIR"

      - name: Archive release package
        env:
          RELEASE_DIR: ${{ runner.temp }}/pt-auto-release
          RELEASE_ZIP: ${{ runner.temp }}/pt-auto-downloader-release.zip
        run: |
          python - <<'PY'
          import os
          import shutil

          release_dir = os.environ["RELEASE_DIR"]
          release_zip = os.environ["RELEASE_ZIP"]
          base_name = release_zip[:-4] if release_zip.endswith(".zip") else release_zip
          shutil.make_archive(base_name, "zip", release_dir)
          PY

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pt-auto-downloader-release
          path: ${{ runner.temp }}/pt-auto-downloader-release.zip
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/pt-auto-downloader-release.zip
          body_path: ${{ runner.temp }}/release-notes.md
          fail_on_unmatched_files: true
          make_latest: true
